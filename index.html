<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <meta name="description" content="Bad-ass Programmer with an R6 MK II">
  <meta property="og:title" content="Kartikey Bhardwaj">
  <link rel="canonical" href="https://kartikeybhardwaj.me">
  <meta property="og:url" content="https://kartikeybhardwaj.me">
  <meta property="og:description" content="Bad-ass Programmer with an R6 MK II">
  <meta property="og:image:secure_url" content="favicon.ico">
  <meta property="og:image" content="favicon.ico">
  <meta property="profile:username" content="kartikeybhardwaj">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Kartikey Bhardwaj">
  <meta name="twitter:image" content="https://kartikeybhardwaj.me/favicon.ico">
  <meta name="twitter:url" content="https://kartikeybhardwaj.me">
  <title>Kartikey Bhardwaj</title>
  <link rel="apple-touch-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #f8f7f4;
      color: #111;
      min-height: 100vh;
      display: grid;
      grid-template-rows: 1fr auto;
      -webkit-font-smoothing: antialiased;
    }

    main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      padding: 12vh 6vw 8vh;
      gap: 4vw;
      align-content: center;
    }

    .identity { align-self: center; }

    .identity h1 {
      font-size: clamp(2.4rem, 5vw, 4.2rem);
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1.05;
    }

    .identity p {
      margin-top: 1.6rem;
      font-size: clamp(0.95rem, 1.4vw, 1.15rem);
      font-weight: 300;
      color: #555;
      line-height: 1.6;
      letter-spacing: 0.01em;
    }

    .links {
      align-self: center;
      display: flex;
      flex-direction: column;
      gap: 3.2rem;
    }

    .section-label {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #999;
    }

    .link-group { display: flex; flex-direction: column; gap: 0.6rem; }

    .link-group a {
      text-decoration: none;
      color: #111;
      font-size: clamp(0.95rem, 1.2vw, 1.1rem);
      font-weight: 400;
      cursor: pointer;
      transition: color 0.2s ease;
      width: fit-content;
    }

    .link-group a:hover { color: #888; }

    nav {
      display: flex;
      gap: 2rem;
      margin-top: 3.2rem;
    }

    nav a {
      text-decoration: none;
      color: #111;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: color 0.2s ease;
    }

    nav a:hover { color: #888; }

    footer {
      padding: 0 6vw 4vh;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
    }

    footer p {
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: #bbb;
      text-transform: uppercase;
    }

    @media (max-width: 680px) {
      main {
        grid-template-columns: 1fr;
        padding: 14vh 8vw 6vh;
        gap: 6vh;
      }
      .links { gap: 2.4rem; }
      nav { gap: 1.4rem; flex-wrap: wrap; }
    }
  </style>
</head>

<body>
  <main>
    <div class="identity">
      <h1>Kartikey<br>Bhardwaj</h1>
      <p>Bad-ass Programmer with an R6 MK II</p>
      <nav>
        <a href="https://github.com/kartikeybhardwaj" target="_blank" rel="noopener nofollow">GitHub</a>
        <a href="https://www.linkedin.com/in/kartikeybhardwaj" target="_blank" rel="noopener nofollow">LinkedIn</a>
        <a href="https://play.google.com/store/apps/dev?id=6912687238262271141" target="_blank" rel="noopener nofollow">Google Play</a>
        <a href="https://open.spotify.com/user/t6b60rn7e3tsr92hly6qyebo4" target="_blank" rel="noopener nofollow">Spotify</a>
      </nav>
    </div>

    <div class="links">
      <div>
        <p class="section-label">There's no time</p>
        <div class="link-group" style="margin-top: 0.8rem;">
          <a href="https://kartikeybhardwaj.com" target="_blank" rel="noopener nofollow">Kartikey Bhardwaj →</a>
          <a href="https://open.spotify.com/track/29Y7wbrOvQlAwZQJM51ugW" target="_blank" rel="noopener nofollow">Now Playing: Survivor // 2WEI →</a>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <p>One World, One People</p>
  </footer>
</body>

</html>
